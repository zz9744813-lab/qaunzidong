<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}小说自动工厂{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>小说自动工厂</h1>
                <p class="version">v0.2.0</p>
            </div>
            <nav class="nav-menu">
                <a href="/novels" class="nav-item {% if request.url.path == '/novels' %}active{% endif %}">
                    <span class="icon">📚</span>
                    <span>小说项目</span>
                </a>
                <a href="/novels/new" class="nav-item {% if request.url.path == '/novels/new' %}active{% endif %}">
                    <span class="icon">✍️</span>
                    <span>创建小说</span>
                </a>
                <a href="/logs" class="nav-item {% if request.url.path == '/logs' %}active{% endif %}">
                    <span class="icon">📋</span>
                    <span>任务日志</span>
                </a>
                <a href="/api-docs" class="nav-item" target="_blank">
                    <span class="icon">📖</span>
                    <span>API 文档</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status">
                    <span class="dot green"></span>
                    <span>系统运行中</span>
                </div>
            </div>
        </aside>

        <!-- 主体内容 -->
        <main class="main-content">
            <!-- 顶部标题栏 -->
            <header class="topbar">
                <div class="topbar-left">
                    <h2>{% block page_title %}控制台{% endblock %}</h2>
                </div>
                <div class="topbar-right">
                    <div class="user-info">
                        <span>管理员</span>
                    </div>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    {% block extra_script %}{% endblock %}
</body>
</html>
